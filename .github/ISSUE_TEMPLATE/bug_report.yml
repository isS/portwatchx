name: Bug report
description: Something behaves incorrectly or crashes.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the details below so we can reproduce and fix it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear and concise description of the bug.
      placeholder: When I run `portwatchx`, the table shows...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: I expected the row for port 3000 to show...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Exact commands or steps. Minimal is best.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: portwatchx-version
    attributes:
      label: portwatchx version
      description: Output of `portwatchx --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v22.x"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: If there's an error in the terminal, paste it here.
      render: shell
